{% extends 'base.html' %}{% block title %}Portfolio{% endblock %}{% block content %}<section class="page-hero"><div class="container py-5"><span class="section-kicker">Portfolio</span><h1 class="hero-title">Completed interior narratives across residences, lounges, and hospitality.</h1></div></section><div class="container py-5"><div class="row g-4 masonry-grid">{% for project in projects %}<div class="col-lg-6"><div class="portfolio-banner"><img src="{{ project.display_image_url }}" alt="{{ project.title }}"><div class="overlay-copy"><p class="caption">{{ project.scope }}</p><h3><a class="text-white text-decoration-none" href="{{ project.get_absolute_url }}">{{ project.title }}</a></h3></div></div></div>{% endfor %}</div></div>{% endblock %}
