{% extends 'dashboard/base.html' %}{% block content %}<div class="d-flex justify-content-between align-items-center mb-4"><h2>{{ title }}</h2><a class="btn btn-dark rounded-pill" href="{% url create_url %}">Create new</a></div><div class="glass-panel p-4"><table class="table"><tr><th>Title</th><th>Status</th><th></th></tr>{% for obj in objects %}<tr><td>{{ obj }}</td><td>{% if obj.published %}Published{% else %}Draft{% endif %}</td><td><a href="{% url edit_name obj.pk %}">Edit</a></td></tr>{% endfor %}</table></div>{% endblock %}
